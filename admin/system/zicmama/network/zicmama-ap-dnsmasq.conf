# ZICMAMA laptop — DHCP + DNS (voir zicmama_ap_laptop.sh)
interface=${AP_IFACE}
bind-interfaces
except-interface=lo
dhcp-range=${DHCP_START},${DHCP_END},12h
dhcp-option=3,${GATEWAY_IP}
dhcp-option=6,${GATEWAY_IP}
no-resolv
cache-size=300
log-dhcp

# Walled-garden strict : tout domaine résout vers la passerelle locale, sur tous les
# OS. zicmama_ap_portal.py fait lui-même office de proxy applicatif vers PORTAL_URL
# (le laptop a un accès Internet réel via son autre carte WiFi) — aucune route n'est
# donc ouverte entre le réseau ZICMAMA et Internet : voir zicmama-ap-firewall.sh.
address=/#/${GATEWAY_IP}
