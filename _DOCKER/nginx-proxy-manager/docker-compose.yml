services:
  app:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: always
    ports:
      - '80:80'                      # HTTP  (public — Let's Encrypt challenge)
      - '443:443'                    # HTTPS (public)
      - '127.0.0.1:81:81'            # Interface admin NPM (local uniquement)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ~/.zen/nginx-proxy-manager/data:/data
      - ~/.zen/nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    networks:
      - dragon-net                   # proxy des autres services par nom de conteneur

networks:
  dragon-net:
    external: true                   # créé par install.sh juste après l'install Docker
