<style>
.step-wrap { padding: 1rem 0; }
.step-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
.step-pill { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); font-size: 13px; cursor: pointer; background: var(--color-background-secondary); color: var(--color-text-secondary); transition: all .15s; }
.step-pill.active { background: #534AB7; color: #EEEDFE; border-color: #534AB7; }
.step-body { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; }
.step-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 4px; }
.step-sub { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 1rem; }
.channel-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.channel-row:last-child { border-bottom: none; }
.ch-badge { min-width: 80px; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 4px; text-align: center; }
.ch-blue { background: #E6F1FB; color: #0C447C; }
.ch-purple { background: #EEEDFE; color: #3C3489; }
.ch-teal { background: #E1F5EE; color: #085041; }
.ch-amber { background: #FAEEDA; color: #633806; }
.ch-coral { background: #FAECE7; color: #712B13; }
.ch-pink { background: #FBEAF0; color: #72243E; }
.ch-info { flex: 1; }
.ch-label { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 2px; }
.ch-desc { font-size: 12px; color: var(--color-text-secondary); }
code { font-family: var(--font-mono); font-size: 12px; background: var(--color-background-secondary); padding: 2px 6px; border-radius: 4px; color: var(--color-text-primary); }
.cmd-block { font-family: var(--font-mono); font-size: 12px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; padding: 12px 14px; margin: 8px 0; color: var(--color-text-primary); white-space: pre; overflow-x: auto; line-height: 1.6; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.dot-ok { background: #1D9E75; }
.dot-warn { background: #BA7517; }
.dot-info { background: #378ADD; }
.tip { background: var(--color-background-secondary); border-left: 2px solid #534AB7; border-radius: 0 6px 6px 0; padding: 10px 12px; font-size: 13px; color: var(--color-text-secondary); margin-top: 12px; }
button.ask { cursor: pointer; background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: 6px; padding: 6px 12px; font-size: 12px; color: var(--color-text-secondary); margin-top: 10px; }
button.ask:hover { background: var(--color-background-secondary); }
</style>

<div class="step-wrap">
<div class="step-nav" id="nav"></div>
<div class="step-body" id="body"></div>
</div>

<script>
const steps = [
  {
    label: "1 · Stack",
    title: "Vérifier la stack Docker",
    sub: "Tous les services doivent être UP avant de connecter les canaux",
    content: () => `
<div class="cmd-block">cd ~/.zen/ai-company
docker compose -p ai-company-swarm ps</div>
<div style="margin-top:12px;font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px;">Services attendus :</div>
${[
  ['OK','Paperclip','http://localhost:3100','Agents IA'],
  ['OK','Open WebUI','http://localhost:8000','Interface chat'],
  ['OK','LiteLLM','http://localhost:8010','Proxy modèles'],
  ['OK','Qdrant','http://localhost:6333','Mémoire vectorielle'],
  ['OK','Ollama','http://localhost:11434','LLM local (hôte)'],
].map(([s,n,u,d])=>`<div class="channel-row">
  <span class="status-dot dot-ok"></span>
  <div class="ch-info"><div class="ch-label">${n} <span style="font-weight:400;color:var(--color-text-secondary);font-size:12px;">— ${u}</span></div><div class="ch-desc">${d}</div></div>
</div>`).join('')}
<div class="tip">Si un service est DOWN : <code>docker compose -p ai-company-swarm up -d [nom]</code></div>
<button class="ask" onclick="sendPrompt('Comment déboguer un service Docker qui ne démarre pas dans ai-company-swarm ?')">Comment déboguer ? ↗</button>`
  },
  {
    label: "2 · Telegram",
    title: "Connecter Telegram",
    sub: "Créer un bot et l'ajouter comme skill dans Paperclip",
    content: () => `
<div style="font-size:13px;color:var(--color-text-primary);margin-bottom:12px;">Étapes :</div>
${[
  ['1','Sur Telegram, ouvrir @BotFather','Envoyer <code>/newbot</code>, choisir un nom et un username (ex: <code>uplanet_marketing_bot</code>)'],
  ['2','Récupérer le token','BotFather renvoie un token : <code>7123456789:AAHxxxxxxxx</code> — copier dans le .env'],
  ['3','Ajouter dans .env','<code>echo "TELEGRAM_BOT_TOKEN=7123456:AAHxxx" >> ~/.zen/ai-company/.env</code>'],
  ['4','Créer le groupe ou canal','Ajouter le bot comme admin avec droit de poster'],
  ['5','Récupérer le chat_id','Envoyer un message au bot puis : <code>curl "https://api.telegram.org/bot$TOKEN/getUpdates"</code>'],
].map(([n,l,d])=>`<div class="channel-row"><span class="ch-badge ch-blue">${n}</span><div class="ch-info"><div class="ch-label">${l}</div><div class="ch-desc">${d}</div></div></div>`).join('')}
<div class="cmd-block">TELEGRAM_BOT_TOKEN=7123456:AAHxxx
TELEGRAM_CHAT_ID=-1001234567890   # groupe négatif</div>
<div class="tip">Dans Paperclip → Agent community → Skills → ajouter "Telegram poster" avec ces deux variables.</div>
<button class="ask" onclick="sendPrompt('Rédige le code du skill Telegram pour Paperclip qui poste et lit les messages du groupe UPlanet')">Générer le skill Telegram ↗</button>`
  },
  {
    label: "3 · Gmail",
    title: "Connecter Gmail (OAuth2)",
    sub: "API Gmail pour les séquences email marketing",
    content: () => `
${[
  ['1','Google Cloud Console','Aller sur <a href="https://console.cloud.google.com" style="color:var(--color-text-info)">console.cloud.google.com</a> → Nouveau projet "UPlanet Marketing"'],
  ['2','Activer Gmail API','APIs & Services → Bibliothèque → chercher "Gmail API" → Activer'],
  ['3','Créer credentials OAuth2','Credentials → + Créer → OAuth client ID → Application bureau'],
  ['4','Télécharger credentials.json','Placer dans <code>~/.zen/ai-company/gmail_credentials.json</code>'],
  ['5','Générer refresh token','<code>python3 gmail_auth.py</code> (script ci-dessous) → autoriser dans navigateur'],
].map(([n,l,d])=>`<div class="channel-row"><span class="ch-badge ch-amber">${n}</span><div class="ch-info"><div class="ch-label">${l}</div><div class="ch-desc">${d}</div></div></div>`).join('')}
<div class="cmd-block">pip install google-auth-oauthlib google-auth-httplib2
python3 - &lt;&lt;'EOF'
from google_auth_oauthlib.flow import InstalledAppFlow
flow = InstalledAppFlow.from_client_secrets_file(
  'gmail_credentials.json',
  ['https://www.googleapis.com/auth/gmail.send',
   'https://www.googleapis.com/auth/gmail.readonly'])
creds = flow.run_local_server(port=0)
print("GMAIL_REFRESH_TOKEN=" + creds.refresh_token)
EOF</div>
<div class="tip">Ajouter le refresh token dans .env — le skill Gmail de Paperclip l'utilisera pour envoyer sans re-authentifier.</div>
<button class="ask" onclick="sendPrompt('Rédige le skill Gmail pour Paperclip : envoi de newsletter UPlanet avec suivi des ouvertures')">Générer le skill Gmail ↗</button>`
  },
  {
    label: "4 · Mastodon",
    title: "Connecter Mastodon",
    sub: "Via API REST — instance de ton choix (ex: mamot.fr)",
    content: () => `
${[
  ['1','Créer une application','Sur ton instance : Préférences → Développement → Nouvelle application → cocher <code>write:statuses</code>'],
  ['2','Récupérer access token','Copier le token généré (format : <code>xxxx_xxxxxxxxxx</code>)'],
  ['3','Ajouter dans .env','<code>MASTODON_TOKEN=xxxx</code> et <code>MASTODON_INSTANCE=https://mamot.fr</code>'],
  ['4','Test rapide','<code>curl -H "Authorization: Bearer $TOKEN" "$INSTANCE/api/v1/accounts/verify_credentials"</code>'],
].map(([n,l,d])=>`<div class="channel-row"><span class="ch-badge ch-purple">${n}</span><div class="ch-info"><div class="ch-label">${l}</div><div class="ch-desc">${d}</div></div></div>`).join('')}
<div class="cmd-block">curl -X POST \\
  -H "Authorization: Bearer $MASTODON_TOKEN" \\
  -F "status=Test depuis Paperclip #UPlanet" \\
  "$MASTODON_INSTANCE/api/v1/statuses"</div>
<div class="tip">L'API Mastodon est simple et sans OAuth complexe — idéale pour démarrer rapidement avec Paperclip.</div>
<button class="ask" onclick="sendPrompt('Rédige le skill Mastodon pour Paperclip : poster des toots UPlanet avec hashtags automatiques')">Générer le skill Mastodon ↗</button>`
  },
  {
    label: "5 · LinkedIn",
    title: "Connecter LinkedIn",
    sub: "Via LinkedIn API (nécessite une company page)",
    content: () => `
${[
  ['1','LinkedIn Developer Portal','Aller sur <a href="https://developer.linkedin.com" style="color:var(--color-text-info)">developer.linkedin.com</a> → Créer une app liée à ta page entreprise'],
  ['2','Activer les produits','Activer "Share on LinkedIn" et "Sign In with LinkedIn"'],
  ['3','OAuth2 flow','Scopes requis : <code>w_member_social</code>, <code>r_liteprofile</code>'],
  ['4','Récupérer access token','Token valable 60 jours — prévoir un refresh automatique hebdomadaire'],
  ['5','Alternative simple','Utiliser un outil comme <code>linkedin-api</code> (Python, non officiel) pour usage personnel'],
].map(([n,l,d])=>`<div class="channel-row"><span class="ch-badge ch-teal">${n}</span><div class="ch-info"><div class="ch-label">${l}</div><div class="ch-desc">${d}</div></div></div>`).join('')}
<div class="tip">LinkedIn est le canal le plus restrictif (rate limits stricts, review d'app requise pour certains scopes). Commencer par Telegram + Mastodon + Gmail, ajouter LinkedIn en phase 2.</div>
<button class="ask" onclick="sendPrompt('Comment automatiser des posts LinkedIn pour UPlanet avec Paperclip sans se faire bannir ?')">Stratégie LinkedIn ↗</button>`
  },
  {
    label: "6 · .env final",
    title: "Fichier .env complet",
    sub: "Tous les secrets au même endroit pour le swarm",
    content: () => `
<div class="cmd-block"># ~/.zen/ai-company/.env
# --- Générés par install-ai-company.sh ---
POSTGRES_PASSWORD=xxxx
QDRANT_API_KEY=&lt;UPLANETNAME&gt;
PAPERCLIP_AUTH_SECRET=xxxx
LITELLM_MASTER_KEY=sk-swarm-xxxx
WEBUI_SECRET_KEY=xxxx

# --- Telegram ---
TELEGRAM_BOT_TOKEN=7123456:AAHxxxx
TELEGRAM_CHAT_ID=-1001234567890

# --- Gmail OAuth2 ---
GMAIL_CLIENT_ID=xxxx.apps.googleusercontent.com
GMAIL_CLIENT_SECRET=GOCSPX-xxxx
GMAIL_REFRESH_TOKEN=1//xxxx

# --- Mastodon ---
MASTODON_INSTANCE=https://mamot.fr
MASTODON_TOKEN=xxxx

# --- LinkedIn (optionnel phase 2) ---
LINKEDIN_ACCESS_TOKEN=xxxx
LINKEDIN_PERSON_ID=xxxx

# --- Nostr / Astroport ---
NOSTR_NSEC=nsec1xxxx           # clé privée station
ASTROPORT_API=http://localhost:1234</div>
<button class="ask" onclick="sendPrompt('Génère le fichier configure-channels.sh qui valide tous ces tokens et affiche un rapport de santé')">Générer le script de validation ↗</button>`
  }
];

const nav = document.getElementById('nav');
const body = document.getElementById('body');
let current = 0;

function render(i) {
  current = i;
  nav.querySelectorAll('.step-pill').forEach((p,j) => p.classList.toggle('active', j===i));
  const s = steps[i];
  body.innerHTML = `<div class="step-title">${s.title}</div><div class="step-sub">${s.sub}</div>${s.content()}`;
}

steps.forEach((s, i) => {
  const pill = document.createElement('div');
  pill.className = 'step-pill' + (i===0?' active':'');
  pill.textContent = s.label;
  pill.onclick = () => render(i);
  nav.appendChild(pill);
});

render(0);
</script>
